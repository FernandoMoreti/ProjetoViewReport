services:
  bd:
    image: postgres:15
    container_name: bd_postgres
    restart: always
    # O env_file injeta as variáveis DENTRO do container para o seu código usar
    env_file:
      - ./backend/.env
    environment:
      # O formato ${VAR:-default} garante que o banco suba mesmo que o .env na raiz falhe
      POSTGRES_DB: ${DB_NAME:-dbyo}
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASS:-root}
    ports:
      - "30002:5432"
    networks:
      - rede-projeto
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: api_node
    restart: always
    ports:
      - "30000:3003"
    env_file:
      - ./backend/.env
    environment:
      # Forçamos o host como 'bd' para o Sequelize encontrar o container do banco
      DB_HOST: bd
    depends_on:
      - bd
    networks:
      - rede-projeto

  app:
    build: ./my-app
    container_name: app_next
    restart: always
    ports:
      - "30001:3000"
    networks:
      - rede-projeto

networks:
  rede-projeto:
    driver: bridge

volumes:
  pgdata: